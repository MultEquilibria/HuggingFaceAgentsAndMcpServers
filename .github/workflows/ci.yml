name: CI test

on:
  push:
    branches:
      - main 
    pull_request:  
    workflow_dispatch:

  jobs:
    python-checks:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          
        - name: Set up python
          uses: actions/checkout@v5
          with:
            python-version: "3.13"
          
        - name: Install dependencies
          run: uv sync

        - name: Run Python syntax check
          run: python -m compileall . -x "(.venv|node_modules|.git)"

    node-checks:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        
        - name: Set up Node.js  
          uses: actions/setup-node@v4
          with:
            node-version: "22"

        - name: Install dependencies
          run: npm ci

        - name: Check Typescript files exist
          run: |
            echo "Node dependencies installed"
            find . -name "*.ts"